<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edad Personas - HTML Plano</title>
</head>
<body>
    <section id="body">
        <h2>Gestión de Edades (HTML Plano)</h2>
        <button id="body_btnProcesarPersona">Procesar 1 Edad</button>
        <hr>
        <div>
            La Edad Promedio de los Registrados sería: <span id="body_lblPromedio">0</span>
        </div>
         <div id="body_lblEdadesPersonas"></div>
        <div id="body_lblMayorMenor"></div>
        <div id="body_lblComparacion"></div>
        <div id="body_lblPromedioPeso"></div>
    </section>

    <section id="persona" hidden style="margin-top: 20px; border: 1px solid #ccc; padding: 15px; width: 300px;">
        <h5 id="persona_lblEdad">Procesar Edad</h5>
        <label>nombre:
        <input type="text"id="persona_inNombre" placeholder="Marco"></label><br>
        <label>Edad: 
        <input type="number" id="persona_inEdad" placeholder="Ej: 25"></label><br>
        <label>Peso:
        <input type="number" id="persona_inPeso" placeholder="Ej: 80"></label> 
        <br><br>
        <button id="persona_btCancelar">Cancelar</button>
        <button id="persona_btAceptar">Aceptar</button>
    </section>

    <script type="module">
        import CI_cPersonas from "./dist/controllers/CI_cPersonas.js";
        import CI_cPersona from "./dist/controllers/CI_cPersona.js";
        
        // Opción: Usar vistas de views-plainHTML/
        import CI_vPersonas from "./dist/views/CI_vPersonasPlain.js";
        import CI_vPersona from "./dist/views/CI_vPersonaPlain.js";

        const vistaPersonas = new CI_vPersonas();
        const vistaPersona = new CI_vPersona();
        const controladorPersona = new CI_cPersona(vistaPersona);
        new CI_cPersonas(vistaPersonas, controladorPersona);
    </script>
</body>
</html>
